<!doctype html>
<html>
<head>
  <link rel="stylesheet" type="text/css" href="style.css">
  <title>NesJS</title>
</head>
<body>
  <h1 id="NoScriptElement">You need modern JavaScript to use this emulator.</h1>
  <script type="text/javascript">
    let NoScriptElement=document.getElementById("NoScriptElement");
    NoScriptElement.innerHTML="";
    NoScriptElement.style.display="none";
  </script>
  <input id="rom" type="file">
  <button id="pause">Pause</button>
  <button id="reset">Reset</button>
  <button id="hardreset">Power cycle</button>
  <button id="runframe">Run 1 frame</button>
  <button onclick="if (document.getElementById('output').requestFullscreen) {document.getElementById('output').requestFullscreen();}else if (document.getElementById('output').webkitRequestFullscreen) { /* Safari */ document.getElementById('output').webkitRequestFullscreen();} else if (document.getElementById('output').msRequestFullscreen) { /* IE11 */ document.getElementById('output').msRequestFullscreen();}">Fullscreen</button><br>
  <canvas id="output"></canvas>
  <div style="display:grid;grid-template-rows:repeat(3, 1fr);grid-template-columns:repeat(3, 1fr);"><button style="padding:10px;grid-row:2;grid-column:1;" ontouchstart="nes.setButtonPressed(1, controlsP1['arrowleft']);" ontouchend="nes.setButtonReleased(1, controlsP1['arrowleft']);">⬅️</button><button style="padding:10px;grid-row:1;grid-column:2;" ontouchstart="nes.setButtonPressed(1, controlsP1['arrowup']);" ontouchend="nes.setButtonReleased(1, controlsP1['arrowup']);">⬆️</button><button style="padding:10px;grid-row:3;grid-column:2;" ontouchstart="nes.setButtonPressed(1, controlsP1['arrowdown']);" ontouchend="nes.setButtonReleased(1, controlsP1['arrowdown']);">⬇️</button><button style="padding:10px;grid-row:2;grid-column:3;" ontouchstart="nes.setButtonPressed(1, controlsP1['arrowright']);" ontouchend="nes.setButtonReleased(1, controlsP1['arrowright']);">➡️</button></div>
  <div><button style="padding:10px;" ontouchstart="nes.setButtonPressed(1, controlsP1['z']);" ontouchend="nes.setButtonReleased(1, controlsP1['z']);">A</button>&nbsp;<button style="padding:10px;" ontouchstart="nes.setButtonPressed(1, controlsP1['a']);" ontouchend="nes.setButtonReleased(1, controlsP1['a']);">B</button></div>
  <pre id="log"></pre>
  <p>
    NesJs, by angelo_wf. <a href="debug.html">Debugger</a>, <a href="nsfplayer.html">NsfJs</a>.<br>
    Source on <a href="https://github.com/angelo-wf/NesJs">Github</a>.
  </p>

  <script src="lib/zip.js"></script>
  <script src="lib/inflate.js"></script>

  <script src="nes/mappers.js"></script>
  <script src="mappers/nrom.js"></script>
  <script src="mappers/mmc1.js"></script>
  <script src="mappers/uxrom.js"></script>
  <script src="mappers/cnrom.js"></script>
  <script src="mappers/mmc3.js"></script>
  <script src="mappers/axrom.js"></script>

  <script src="nes/cpu.js"></script>
  <script src="nes/pipu.js"></script>
  <script src="nes/apu.js"></script>
  <script src="nes/nes.js"></script>

  <script src="js/audio.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
